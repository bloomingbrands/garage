version: "3.8"

services:
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: garage
    restart: unless-stopped
    ports:
      - "${GARAGE_RPC_PORT:-3900}:3900"   # RPC (node-to-node)
      - "${GARAGE_S3_PORT:-3901}:3901"    # S3 API
      - "${GARAGE_WEB_PORT:-3902}:3902"  # S3 Web / static sites
      - "${GARAGE_ADMIN_PORT:-3903}:3903" # Admin API
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      - TZ=${TZ:-UTC}
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Coolify / Traefik labels (optional — uncomment if you want HTTPS via Coolify's proxy)
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.garage-s3.rule=Host(`s3.yourdomain.com`)
    #   - traefik.http.routers.garage-s3.entrypoints=websecure
    #   - traefik.http.services.garage-s3.loadbalancer.server.port=3901

volumes:
  garage-meta:
    driver: local
  garage-data:
    driver: local
