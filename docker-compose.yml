services:
  garage:
    image: dxflrs/garage:v1.1.0
    container_name: garage
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    networks:
      - garage_net
    # No host ports published: the S3 API (3900) and admin API (3903) stay on the
    # internal network only. Your app reaches Garage as http://garage:3900.

  # One-shot container: initialises cluster layout, bucket and S3 key, then exits.
  # Idempotent — safe to run on every deploy.
  garage-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    depends_on:
      - garage
    restart: "no"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      BUCKET_NAME: ${BUCKET_NAME:-contracts}
      CAPACITY: ${CAPACITY:-10G}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    networks:
      - garage_net

  # Web admin UI (third-party). Expose THIS service publicly in Coolify (port 3909)
  # and protect it with a login via AUTH_USER_PASS.
  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    depends_on:
      - garage
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
      S3_REGION: "garage"
      API_ADMIN_KEY: ${GARAGE_ADMIN_TOKEN}
      # username:bcrypt-hash — required so the public UI is not open to everyone.
      AUTH_USER_PASS: ${WEBUI_AUTH}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    networks:
      - garage_net
    # In Coolify, assign a domain to this service pointing at container port 3909.

volumes:
  garage_meta:
  garage_data:

networks:
  garage_net:
