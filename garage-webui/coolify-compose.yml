      retries: 5
      start_period: 30s
    container_name: garage-pfg0mgpbrsf6nixuo3idupgx
    labels:
      - coolify.managed=true
      - coolify.version=4.1.1
      - coolify.serviceId=11
      - coolify.type=service
      - coolify.name=garage-pfg0mgpbrsf6nixuo3idupgx
      - coolify.resourceName=garage
      - coolify.projectName=titan01
      - coolify.serviceName=garage
      - coolify.environmentName=production
      - coolify.pullRequestId=0
      - coolify.service.subId=13
      - coolify.service.subType=application
      - coolify.service.subName=garage
      - traefik.enable=true
      - traefik.http.routers.https-0-garage-s3.rule=Host(`s3.blooming-brands.com`) && PathPrefix(`/`)
      - traefik.http.routers.https-0-garage-s3.entryPoints=https
