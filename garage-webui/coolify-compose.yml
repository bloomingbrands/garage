      S3_REGION: garage
      API_ADMIN_KEY: gov7peGBHXxlP8D42MzMtPWCEveHy7XuG2QR2thFVAo=
      AUTH_USER_PASS: 'admin:$$2y$$05$$yIZDkdP6bIHH4nKwj9Ffe.zKYhw5xeF6vzXkWc01J.w4kQK2lCnMa'
      HOST: 0.0.0.0
      PORT: '3909'
      COOLIFY_RESOURCE_UUID: pfg0mgpbrsf6nixuo3idupgx
      COOLIFY_CONTAINER_NAME: garage-webui-pfg0mgpbrsf6nixuo3idupgx
