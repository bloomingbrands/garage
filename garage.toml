# Garage configuration for single-node deployment
# Secrets (rpc_secret, admin_token, metrics_token) are injected via
# environment variables: GARAGE_RPC_SECRET, GARAGE_ADMIN_TOKEN, GARAGE_METRICS_TOKEN

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage-os.blooming-brands.com:3901"

[s3_api]
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".garage-os.blooming-brands.com"

[admin]
api_bind_addr = "[::]:3903"