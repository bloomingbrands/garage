# Garage configuration template.
#
# The rpc_secret / admin_token / metrics_token and the two root_domain lines are
# rewritten at container start by /server-init.sh from environment variables
# (set in Coolify). Do NOT commit real secrets here.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "__RPC_SECRET__"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.example.com"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.example.com"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "__ADMIN_TOKEN__"
metrics_token = "__METRICS_TOKEN__"
