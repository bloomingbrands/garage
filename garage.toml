# Garage S3-Compatible Storage Configuration
# Based on: https://oneuptime.com/blog/post/2026-03-02-how-to-set-up-garage-s3-compatible-storage-on-ubuntu/view

# RPC bind address (internal node communication)
rpc_bind_addr = "0.0.0.0:3900"

# Generate a strong secret with: openssl rand -hex 32
# This must be set before first deployment.
rpc_secret = "0da8101fd410d5704760d012e98514da3469f6e9e8ede8a6a1b8c70a0fe1982e"

# Metadata and data directories inside the container
metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"

[s3_api]
api_bind_addr = "0.0.0.0:3901"
s3_region     = "us-east-1"

[s3_web]
bind_addr   = "0.0.0.0:3902"
root_domain = ".web.garage.local"
index       = "index.html"

[admin]
api_bind_addr = "0.0.0.0:3903"
