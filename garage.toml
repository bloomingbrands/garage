# =============================================================================
# Reference garage.toml (what the container generates internally)
# =============================================================================
# DO NOT commit real secrets to this file.
# The entrypoint script writes /etc/garage.toml automatically from env vars.
# This file is kept in the repo only as documentation.
# =============================================================================

rpc_bind_addr = "0.0.0.0:3900"
rpc_secret    = "SET_VIA_GARAGE_RPC_SECRET_ENV_VAR"

metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"

[s3_api]
api_bind_addr = "0.0.0.0:3901"
s3_region     = "us-east-1"

[s3_web]
bind_addr   = "0.0.0.0:3902"
root_domain = ".web.garage.local"
index       = "index.html"

[admin]
api_bind_addr = "0.0.0.0:3903"
