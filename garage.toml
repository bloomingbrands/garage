metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "0.0.0.0:3901"
rpc_public_addr = "127.0.0.1:3901"
# rpc_secret, admin_token, metrics_token come from env vars:
#   GARAGE_RPC_SECRET  (set by Coolify SERVICE_PASSWORD_RPCSECRET)
#   GARAGE_ADMIN_TOKEN (set by Coolify SERVICE_PASSWORD_ADMINTOKEN)
#   GARAGE_METRICS_TOKEN (set by Coolify SERVICE_PASSWORD_METRICSTOKEN)

[s3_api]
s3_region = "garage"
api_bind_addr = "0.0.0.0:3900"
root_domain = ".s3.blooming-brands.com"

[s3_web]
bind_addr = "0.0.0.0:3902"
root_domain = ".web.blooming-brands.com"
index = "index.html"

[admin]
api_bind_addr = "0.0.0.0:3903"
# admin_token and metrics_token set via env vars